# Disclaimers for subscriptions - Language: English
#
# Hierarchical keys with dot-notation: state.profile_codice_interno.domain_name
# Resolution order from most specific to least specific:
#   1. {state}.{codice_interno}.{domain}  (most specific)
#   2. {state}.{codice_interno}
#   3. {state}
#   4. default                            (fallback)
#
# Values are normalized to lowercase.
# Content is in Markdown format.
#
# If the domain name contains spaces, enclose the key in quotes:
#   "draft.pdnd.domain with spaces": |
#     Disclaimer text...
#
# To override these disclaimers externally, copy this file to:
#   /var/govcat/conf/disclaimers_en.yml
#

default: |
  By proceeding with this subscription, the organization accepts the terms and conditions of the service.

# Example: disclaimer for PDND profile on the PDND domain
bozza.pdnd.pdnd: |
  ## PDND subscription draft
  This subscription uses the **PDND** profile. Before proceeding, make sure you have
  completed the registration on the PDND platform and have an active e-service.

# Example: key with spaces in the domain name (enclosed in quotes)
"bozza.interno_https.dominio di test": |
  ## mTLS subscription draft
  This subscription uses the **mTLS** profile on the **Dominio di Test** domain.
  Please verify that you have a valid client certificate before proceeding.
