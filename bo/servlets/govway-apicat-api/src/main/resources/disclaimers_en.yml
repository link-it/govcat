# =============================================================================
# CLIENT CONFIGURATION DISCLAIMERS (per profile + environment)
#
# Shown in the test and production configuration pages, regardless of the
# subscription state. For this reason every disclaimer is replicated for EACH
# state of the workflow, with .collaudo and .produzione suffix.
#
# All disclaimers in this section have severity INFO.
# =============================================================================

# -----------------------------------------------------------------------------
# ANCHORS - reusable text definitions
# -----------------------------------------------------------------------------

__anchor_modi: &disclaimer_modi |
  You are creating a new client for this subscription. You will need to upload (or request) the X.509 certificate of your organization. The client and certificates will be associated with the subscription and can be reused for subsequent subscriptions.

__anchor_pdnd: &disclaimer_pdnd |
  You are registering a new client for this subscription. You will need to provide the identifier of the client you have already created on the PDND portal. This client will be associated with the subscription and can be reused for other subscriptions through PDND.

__anchor_pdnd_mtls: &disclaimer_pdnd_mtls |
  You are creating a new client for this subscription. This profile requires both an X.509 certificate for mTLS channel authentication and the identifier of the PDND client already registered on the PDND portal. The client will be associated with the subscription and can be reused for subsequent subscriptions.

__anchor_oauth_ac: &disclaimer_oauth_ac |
  You are registering a new OAuth client for this subscription. The service uses the Authorization Code flow, which involves the end user in the authentication process. You will need to provide the URLs of your application that will handle the OAuth flow. The client will be associated with the subscription and can be reused for subsequent subscriptions.

__anchor_oauth_cc: &disclaimer_oauth_cc |
  You are configuring a client for machine-to-machine authentication via OAuth 2.0 with the Client Credentials flow. The service will be called directly by your application, without involvement of the end user. You will need to provide the name of the client to register. The client will be associated with the subscription and can be reused for subsequent subscriptions.

__anchor_http_basic: &disclaimer_http_basic |
  You are configuring a client for HTTP Basic authentication. You only need to provide the name of the client. Access credentials (username and password) will be generated and communicated by the catalog manager. The client will be associated with the subscription and can be reused for subsequent subscriptions.

__anchor_mtls: &disclaimer_mtls |
  You are creating a new client for this subscription. You will need to upload (or request) the X.509 certificate of your organization. The client and the certificate will be associated with the subscription and can be reused for subsequent subscriptions.

__anchor_no_dati: &disclaimer_no_dati |
  You are configuring a client for a service that does not require additional authentication. You only need to provide the name of the client to associate with this subscription. The client will be registered on the API Gateway and can be reused for subsequent subscriptions.

__anchor_mtls_fruizioni: &disclaimer_mtls_fruizioni |
  You are creating a new client to access a service provided through PDND. You will need to upload (or request) the X.509 certificate that your application will use to authenticate to the providing organization. The client and the certificate will be associated with the subscription and can be reused for subsequent subscriptions.

__anchor_oauth_cc_fruizioni: &disclaimer_oauth_cc_fruizioni |
  You are registering a new client to access a service provided through PDND with OAuth 2.0 Client Credentials authentication. Your application will authenticate with an OAuth token without involvement of the end user. Credentials will be generated and communicated by the catalog manager. The client will be associated with the subscription and can be reused for subsequent subscriptions.

__anchor_basic_fruizioni: &disclaimer_basic_fruizioni |
  You are registering a new client to access a service provided through PDND with HTTP Basic authentication. Access credentials will be generated and communicated by the catalog manager after the request is approved. The client will be associated with the subscription and can be reused for subsequent subscriptions.

# Adapted from OAuth CC Fruizioni keeping the PDND context
__anchor_oauth_ac_fruizioni: &disclaimer_oauth_ac_fruizioni |
  You are registering a new client to access a service provided through PDND with OAuth 2.0 Authorization Code authentication. The flow involves the end user in the authentication process. You will need to provide the URLs of your application that will handle the OAuth flow. The client will be associated with the subscription and can be reused for subsequent subscriptions.

