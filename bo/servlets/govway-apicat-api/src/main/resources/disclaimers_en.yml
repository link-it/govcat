    You are consuming a real PDND e-service: requests consume PDND quota.

# -----------------------------------------------------------------------------
# EXAMPLES WITH CONTEXT SUFFIX (.collaudo / .produzione)
# -----------------------------------------------------------------------------

pubblicato_collaudo.pdnd.collaudo: |
  In the **PDND test** environment you can make test calls with test
  identifiers. It does not consume production quota.

pubblicato_produzione.pdnd.produzione:
  severity: ERROR
  testo: |
    In **PDND production** every call uses real tokens and consumes quota.

pubblicato_collaudo.modi_p2.collaudo: |
  In the **test** environment for ModI P2 you can use test certificates.

pubblicato_produzione.modi_p2.produzione:
  severity: ERROR
  testo: |
    In **production** ModI P2 certificates must be real ones. Verify the
    expiration date and rotate them in time.

