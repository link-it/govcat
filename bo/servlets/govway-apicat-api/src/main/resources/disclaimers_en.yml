# =============================================================================
# Disclaimers for subscriptions - Language: English
# =============================================================================
#
# Hierarchical keys with dot-notation: state.profile_codice_interno.domain_name
# Optionally you can append a ".collaudo" or ".produzione" suffix to specify the
# context (otherwise the context is "generale").
#
# Resolution order from most specific to least specific. For each level both the
# base key and the variants with ".collaudo" and ".produzione" suffix are tried:
#   1. {state}.{codice_interno}.{domain}[.{ambiente}]  (most specific)
#   2. {state}.{codice_interno}[.{ambiente}]
#   3. {state}[.{ambiente}]
#   4. default                                         (fallback)
#
# VALUE FORMATS:
#   - Plain string               -> default severity = INFO
#   - Object { severity, testo } -> explicit severity
#
# SEVERITY: INFO | WARNING | ERROR
#
# To override these disclaimers externally, copy this file to:
#   /var/govcat/conf/disclaimers_en.yml
# =============================================================================

# -----------------------------------------------------------------------------
# GENERAL FALLBACK
# -----------------------------------------------------------------------------

default: |
  By proceeding with this subscription, the organization accepts the terms and
  conditions of the service.

# -----------------------------------------------------------------------------
# STATE-LEVEL DISCLAIMERS (generic, profile-independent)
# -----------------------------------------------------------------------------

bozza:
  severity: WARNING
  testo: |
    ## Subscription draft
    The subscription has been created but has not yet been submitted for configuration. To proceed:
    - Complete the configuration in the **Test** and/or **Production** sections
    - Submit the request through the **"Request test configuration"** button

    As long as the subscription remains a draft, it will not be visible to the service contacts.

richiesto_collaudo: |
  ## Awaiting authorization
  The subscription request for **test** has been submitted and is awaiting authorization from the **service contact**. No further action is required from you at this stage. You will receive a notification once the request is evaluated.

autorizzato_collaudo: |
  ## Authorized — awaiting configuration
  The subscription request for **test** has been authorized. The platform manager is configuring it on the API Gateway. You will receive a notification once it is complete.

in_configurazione_manuale_collaudo: |
  ## Configuration in progress (test)
  The manager is configuring the subscription on the **test** API Gateway. No action is required from you. You will receive a notification upon completion.

in_configurazione_automatica_collaudo: |
  ## Configuration in progress (test)
  The platform manager is configuring the subscription on the **test** API Gateway. No action is required from you. You will receive a notification upon completion.

pubblicato_collaudo: |
  ## Subscription active in test
  The subscription is **active in the test environment**. You can proceed with integration testing. When ready, start the procedure to request publication in **production**.

richiesto_produzione: |
  ## Awaiting authorization (production)
  The subscription request for **production** has been submitted and is awaiting authorization from the **service contact**. No further action is required from you. You will receive a notification once the request is evaluated.

autorizzato_produzione: |
  ## Authorized — awaiting configuration (production)
  The subscription request for **production** has been authorized. The platform manager is configuring it on the API Gateway. You will receive a notification once it is complete.

in_configurazione_manuale_produzione: |
  ## Configuration in progress (production)
  The platform manager is configuring the subscription on the **production** API Gateway. No action is required from you. You will receive a notification upon completion.

in_configurazione_automatica_produzione: |
  ## Automatic configuration in progress (production)
  The platform manager is configuring the subscription on the **production** API Gateway. No action is required from you. You will receive a notification upon completion.

pubblicato_produzione: |
  ## Subscription active in production ✓
  The subscription is **active in production**. The service is operational. For changes or updates to the configuration, please contact the service contact.

archiviato:
  severity: WARNING
  testo: |
    ## Archived subscription
    This subscription has been **archived** and is no longer active. The service is not accessible through this subscription. To restore access, a new subscription procedure must be initiated.

# -----------------------------------------------------------------------------
# PDND PROFILES
# -----------------------------------------------------------------------------

bozza.pdnd:
  severity: WARNING
  testo: |
    ## PDND profile
    This profile requires registration of the e-service on the PDND platform.
    Make sure you have the e-service **identifier** and **version** configured.

bozza.pdnd-audit:
  severity: WARNING
  testo: |
    ## PDND + Audit profile
    PDND audit requires the additional configuration of the audit token policy.
    Verify that you have access to the required policy.

bozza.pdnd-https:
  severity: WARNING
  testo: |
    ## PDND + mTLS profile
    Besides PDND registration, a valid **client certificate** is required for
    mTLS authentication.

bozza.pdnd-integrity-rest:
  severity: WARNING
  testo: |
    ## PDND + Integrity profile (REST)
    This profile requires **Integrity** support for REST APIs. Verify that
    the exposed API is compatible.

bozza.pdnd-integrity-soap:
  severity: WARNING
  testo: |
    ## PDND + Integrity profile (SOAP)
    This profile requires **Integrity** support for SOAP APIs.

bozza.pdnd-audit-integrity-rest:
  severity: WARNING
  testo: |
    ## PDND + Audit + Integrity profile (REST)
    Complete combination: audit + integrity for REST APIs. Verify that both
    token policies are configured.

bozza.pdnd-audit-integrity-soap:
  severity: WARNING
  testo: |
    ## PDND + Audit + Integrity profile (SOAP)
    Complete combination: audit + integrity for SOAP APIs.

bozza.pdnd-integrity-rest-https:
  severity: WARNING
  testo: |
    ## PDND + Integrity + mTLS profile (REST)
    This profile combines PDND registration with Integrity and mTLS
    authentication. Both eService and client certificate are required.

bozza.pdnd-integrity-soap-https:
  severity: WARNING
  testo: |
    ## PDND + Integrity + mTLS profile (SOAP)
    This profile combines PDND registration with Integrity and mTLS
    authentication for SOAP APIs.

pubblicato_produzione.pdnd:
  severity: ERROR
  testo: |
    ## Warning: PDND in production
    The subscription is active on the production PDND platform. Changes to the
    configuration (token policy, audit, rate limiting) have immediate impact on
    end users and PDND consumption.

pubblicato_produzione.pdnd-audit:
  severity: ERROR
  testo: |
    ## Warning: PDND + Audit in production
    Calls generate real audit events. Consider the impacts before changing the
    configuration.

# -----------------------------------------------------------------------------
# ModI PROFILES
# -----------------------------------------------------------------------------

bozza.modi_p1: |
  ## ModI P1 profile
  The **ModI P1** profile uses mTLS authentication. A valid client certificate
  is required.

bozza.modi_p2:
  severity: WARNING
  testo: |
    ## ModI P2 profile
    The **ModI P2** profile requires both the *mTLS authentication
    certificate* and the *message signing certificate*.

bozza.modi_p3:
  severity: WARNING
  testo: |
    ## ModI P3 profile
    The **ModI P3** profile requires both the *mTLS authentication
    certificate* and the *message signing certificate*, with security
    requirements beyond ModI P2.

pubblicato_produzione.modi_p2:
  severity: ERROR
  testo: |
    ## ModI P2 in production
    The signing certificate is in use: rotating it requires coordination with
    the reference subject to avoid service disruption.

pubblicato_produzione.modi_p3:
  severity: ERROR
  testo: |
    ## ModI P3 in production
    The signing certificate is in use: rotating it requires coordination with
    the reference subject to avoid service disruption.

# -----------------------------------------------------------------------------
# INTERNAL PROFILES
# -----------------------------------------------------------------------------

bozza.interno_https: |
  ## Internal mTLS profile
  Authentication via **client certificate (mTLS)**. Provide a valid certificate
  or request one through CN or CSR.

bozza.interno_http_basic: |
  ## Internal HTTP Basic profile
  Username/password authentication. *Rate limiting* and *usage purpose* can
  be configured.

bozza.interno_no_dati:
  severity: WARNING
  testo: |
    ## Internal no-authentication profile
    No authentication is required. Carefully evaluate usage in exposed or
    multi-tenant environments.

bozza.interno_oauth_client_credentials: |
  ## Internal OAuth Client Credentials profile
  Machine-to-machine authentication via OAuth2 tokens (Client Credentials flow).

bozza.interno_oauth_authorization_code: |
  ## Internal OAuth Authorization Code profile
  Authentication via *Authorization Code* flow. Configure client-id,
  client-secret and redirect URI.

# -----------------------------------------------------------------------------
# PDND FRUIZIONE PROFILES (toward external PDND)
# -----------------------------------------------------------------------------

bozza.mtls_fruizioni: |
  ## PDND Fruizione - mTLS
  Profile for consuming a PDND e-service with **mTLS** authentication.
  Requires a valid client certificate.

bozza.basic_fruizioni: |
  ## PDND Fruizione - HTTP Basic
  Profile for consuming a PDND e-service with **HTTP Basic** authentication.

bozza.oauth_ac_fruizioni: |
  ## PDND Fruizione - OAuth Authorization Code
  Profile for consuming a PDND e-service with **OAuth Authorization Code**.

bozza.oauth_cc_fruizioni: |
  ## PDND Fruizione - OAuth Client Credentials
  Profile for consuming a PDND e-service with **OAuth Client Credentials**.

pubblicato_produzione.mtls_fruizioni:
  severity: WARNING
  testo: |
    ## PDND Fruizione in production (mTLS)
    You are consuming a real PDND e-service: requests consume PDND quota.

pubblicato_produzione.basic_fruizioni:
  severity: WARNING
  testo: |
    ## PDND Fruizione in production (HTTP Basic)
    You are consuming a real PDND e-service: requests consume PDND quota.

pubblicato_produzione.oauth_ac_fruizioni:
  severity: WARNING
  testo: |
    ## PDND Fruizione in production (OAuth AC)
    You are consuming a real PDND e-service: requests consume PDND quota.

pubblicato_produzione.oauth_cc_fruizioni:
  severity: WARNING
  testo: |
