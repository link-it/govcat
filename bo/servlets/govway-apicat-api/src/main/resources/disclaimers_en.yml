# =============================================================================
# Disclaimers for subscriptions - Language: English
# =============================================================================
#
# Hierarchical keys with dot-notation: state.profile_codice_interno.domain_name
# Optionally you can append a ".collaudo" or ".produzione" suffix to specify the
# context (otherwise the context is "generale").
#
# Resolution order from most specific to least specific. For each level both the
# base key and the variants with ".collaudo" and ".produzione" suffix are tried:
#   1. {state}.{codice_interno}.{domain}[.{ambiente}]  (most specific)
#   2. {state}.{codice_interno}[.{ambiente}]
#   3. {state}[.{ambiente}]
#   4. default                                         (fallback)
#
# VALUE FORMATS:
#   - Plain string               -> default severity = INFO
#   - Object { severity, testo } -> explicit severity
#
# SEVERITY: INFO | WARNING | ERROR
#
# YAML ANCHORS: keys with "__" prefix do not match any real state/profile/domain
# combination (states and profiles never start with "__") and are used only to
# define reusable values (e.g. the same text for several profiles or all states).
#
# To override these disclaimers externally, copy this file to:
#   /var/govcat/conf/disclaimers_en.yml
# =============================================================================

# -----------------------------------------------------------------------------
# GENERAL FALLBACK
# -----------------------------------------------------------------------------

default: |
  By proceeding with this subscription, the organization accepts the terms and
  conditions of the service.

# -----------------------------------------------------------------------------
# STATE-LEVEL DISCLAIMERS (generic, profile-independent)
# -----------------------------------------------------------------------------

bozza:
  severity: WARNING
  testo: |
    ## Subscription draft
    The subscription has been created but has not yet been submitted for configuration. To proceed:
    - Complete the configuration in the **Test** and/or **Production** sections
    - Submit the request through the **"Request test configuration"** button

    As long as the subscription remains a draft, it will not be visible to the service contacts.

richiesto_collaudo: |
  ## Awaiting authorization
  The subscription request for **test** has been submitted and is awaiting authorization from the **service contact**. No further action is required from you at this stage. You will receive a notification once the request is evaluated.

autorizzato_collaudo: |
  ## Authorized — awaiting configuration
  The subscription request for **test** has been authorized. The platform manager is configuring it on the API Gateway. You will receive a notification once it is complete.

in_configurazione_manuale_collaudo: |
  ## Configuration in progress (test)
  The manager is configuring the subscription on the **test** API Gateway. No action is required from you. You will receive a notification upon completion.

in_configurazione_automatica_collaudo: |
  ## Configuration in progress (test)
  The platform manager is configuring the subscription on the **test** API Gateway. No action is required from you. You will receive a notification upon completion.

pubblicato_collaudo: |
  ## Subscription active in test
  The subscription is **active in the test environment**. You can proceed with integration testing. When ready, start the procedure to request publication in **production**.

richiesto_produzione: |
  ## Awaiting authorization (production)
  The subscription request for **production** has been submitted and is awaiting authorization from the **service contact**. No further action is required from you. You will receive a notification once the request is evaluated.

autorizzato_produzione: |
  ## Authorized — awaiting configuration (production)
  The subscription request for **production** has been authorized. The platform manager is configuring it on the API Gateway. You will receive a notification once it is complete.

in_configurazione_manuale_produzione: |
  ## Configuration in progress (production)
  The platform manager is configuring the subscription on the **production** API Gateway. No action is required from you. You will receive a notification upon completion.

in_configurazione_automatica_produzione: |
  ## Automatic configuration in progress (production)
  The platform manager is configuring the subscription on the **production** API Gateway. No action is required from you. You will receive a notification upon completion.

pubblicato_produzione: |
  ## Subscription active in production ✓
  The subscription is **active in production**. The service is operational. For changes or updates to the configuration, please contact the service contact.

archiviato:
  severity: WARNING
  testo: |
    ## Archived subscription
    This subscription has been **archived** and is no longer active. The service is not accessible through this subscription. To restore access, a new subscription procedure must be initiated.

