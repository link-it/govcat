bozza.pdnd.pdnd: |
  ## PDND sul dominio PDND
  Questo e-service appartiene al dominio PDND. Fare riferimento al referente
  del dominio per l'attivazione.

# Esempio: chiave quotata con spazi nel nome del dominio
"pubblicato_produzione.modi_p1.dominio di test":
  severity: WARNING
  testo: |
    ## ModI P1 - Dominio di Test in produzione
    Esempio di disclaimer che combina profilo e dominio con spazi.
