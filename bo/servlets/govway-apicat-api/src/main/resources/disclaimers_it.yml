# =============================================================================
# Disclaimer per le adesioni - Lingua: Italiano
# =============================================================================
#
# Chiavi gerarchiche con dot-notation: stato.codice_interno_profilo.nome_dominio
# Opzionalmente si puo' aggiungere un suffisso ".collaudo" o ".produzione" per
# il contesto specifico (altrimenti il contesto e' "generale").
#
# La risoluzione avviene dal piu' specifico al meno specifico. Per ogni livello
# vengono cercate anche le varianti con suffisso ".collaudo" e ".produzione":
#   1. {stato}.{codice_interno}.{dominio}[.{ambiente}]  (piu' specifico)
#   2. {stato}.{codice_interno}[.{ambiente}]
#   3. {stato}[.{ambiente}]
#   4. default                                          (fallback)
#
# FORMATI DEL VALORE:
#   - Stringa semplice            -> severity di default = INFO
#   - Oggetto { severity, testo } -> severity esplicita
#
# SEVERITY: INFO | WARNING | ERROR
#
# YAML ANCHORS: le chiavi con prefisso "__" non corrispondono ad alcuna
# combinazione stato/profilo/dominio reale (gli stati e i profili non iniziano
# mai con "__") e sono usate solo per definire valori riutilizzati piu' volte
# (es. lo stesso testo per piu' profili o per tutti gli stati).
#
# Se il nome del dominio contiene spazi, racchiudere la chiave tra virgolette.
#
# Per sovrascrivere questi disclaimer dall'esterno, copiare questo file in:
#   /var/govcat/conf/disclaimers_it.yml
# =============================================================================

# -----------------------------------------------------------------------------
# DISCLAIMER PER STATO (generale, indipendente dal profilo)
# -----------------------------------------------------------------------------

bozza:
  severity: WARNING
  testo: |
    ## Adesione in bozza
    L'adesione è stata creata ma non è ancora stata inviata per la configurazione. Per procedere:
    - Completa la configurazione nelle sezioni **Collaudo** e/o **Produzione**
    - Invia la richiesta tramite il pulsante **"Richiesta configurazione in collaudo"**

    Finché l'adesione rimane in bozza non sarà visibile ai referenti del servizio.

richiesto_collaudo: |
  ## In attesa di autorizzazione
  La richiesta di adesione in **collaudo** è stata inviata ed è in attesa di autorizzazione da parte del **referente del servizio**.

autorizzato_collaudo: |
  ## Autorizzata — in attesa di configurazione
  La richiesta di adesione in **collaudo** è stata autorizzata. Il gestore della piattaforma sta procedendo con la configurazione sull'API Gateway.

in_configurazione_manuale_collaudo: |
  ## Configurazione in corso (collaudo)
  Il gestore sta configurando l'adesione sull'API Gateway di **collaudo**. Non sono richieste azioni da parte tua.

in_configurazione_automatica_collaudo: |
  ## Configurazione in corso (collaudo)
  Il gestore della piattaforma sta configurando l'adesione sull'API Gateway di **collaudo**. Non sono richieste azioni da parte tua.

pubblicato_collaudo: |
  ## Adesione attiva in collaudo
  L'adesione è **attiva nell'ambiente di collaudo**. Puoi procedere con i test di integrazione. Quando sei pronto, avvia la procedura per richiedere la pubblicazione in **produzione**.

richiesto_produzione: |
  ## In attesa di autorizzazione (produzione)
  La richiesta di adesione in **produzione** è stata inviata ed è in attesa di autorizzazione da parte del **referente del servizio**.

autorizzato_produzione: |
  ## Autorizzata — in attesa di configurazione (produzione)
  La richiesta di adesione in **produzione** è stata autorizzata. Il gestore della piattaforma sta procedendo con la configurazione sull'API Gateway.

in_configurazione_manuale_produzione: |
  ## Configurazione in corso (produzione)
  Il gestore della piattaforma sta configurando l'adesione sull'API Gateway di **produzione**. Non sono richieste azioni da parte tua.

in_configurazione_automatica_produzione: |
  ## Configurazione automatica in corso (produzione)
  Il gestore della piattaforma sta configurando l'adesione sull'API Gateway di **produzione**. Non sono richieste azioni da parte tua.

pubblicato_produzione: |
  ## Adesione attiva in produzione ✓
  L'adesione è **attiva in produzione**. Il servizio è operativo. Per modifiche o aggiornamenti alla configurazione contatta il referente del servizio.

archiviato:
  severity: WARNING
  testo: |
    ## Adesione archiviata
    Questa adesione è stata **archiviata** e non è più attiva. Il servizio non è accessibile tramite questa adesione. Per ripristinare l'accesso è necessario avviare una nuova procedura di adesione.

# =============================================================================
# DISCLAIMER PER AMBIENTE (collaudo / produzione), indipendente dal profilo
#
# Mostrato sulla pagina di configurazione di ciascun ambiente, sotto la lista
# dei profili da configurare. Mostrato solo per gli stati "bozza" e
# "pubblicato_collaudo" (in entrambi i contesti collaudo/produzione).
# Severity: INFO (default per stringa semplice).
# =============================================================================

__anchor_ambiente: &disclaimer_ambiente |
  Questo servizio richiede la configurazione dei seguenti profili di sicurezza. Premi (matita) su ciascun profilo per inserire i dati richiesti. Tutti i profili devono essere configurati prima di poter inviare la richiesta.

bozza.collaudo: *disclaimer_ambiente
bozza.produzione: *disclaimer_ambiente
pubblicato_collaudo.collaudo: *disclaimer_ambiente
pubblicato_collaudo.produzione: *disclaimer_ambiente

# =============================================================================
# DISCLAIMER PER CONFIGURAZIONE CLIENT (per profilo + ambiente)
#
# Vengono mostrati nelle pagine di configurazione di collaudo e produzione,
# indipendentemente dallo stato dell'adesione. Per questo motivo ciascun
# disclaimer e' replicato per OGNI stato del workflow, con suffisso .collaudo
# e .produzione.
#
# Tutti i disclaimer in questa sezione hanno severity INFO.
# =============================================================================

# -----------------------------------------------------------------------------
# ANCHORS - definizioni testi riusabili
# -----------------------------------------------------------------------------

__anchor_modi: &disclaimer_modi |
  Stai creando un nuovo client per questa adesione. Dovrai caricare (o richiedere) il certificato X.509 della tua organizzazione. Il client e i certificati verranno associati all'adesione e potranno essere riutilizzati per adesioni successive.

__anchor_pdnd: &disclaimer_pdnd |
  Stai registrando un nuovo client per questa adesione. Dovrai indicare l'identificativo del client che hai già creato sul portale PDND. Tale client verrà associato all'adesione e potrà essere riutilizzato per altre adesioni tramite PDND.

__anchor_pdnd_mtls: &disclaimer_pdnd_mtls |
  Stai creando un nuovo client per questa adesione. Questo profilo richiede sia un certificato X.509 per l'autenticazione del canale mTLS, sia l'identificativo del client PDND già registrato sul portale PDND. Il client verrà associato all'adesione e potrà essere riutilizzato per adesioni successive.

__anchor_oauth_ac: &disclaimer_oauth_ac |
  Stai registrando un nuovo client OAuth per questa adesione. Il servizio utilizza il flusso Authorization Code, che coinvolge l'utente finale nel processo di autenticazione. Dovrai fornire gli URL della tua applicazione che gestiranno il flusso OAuth. Il client verrà associato all'adesione e potrà essere riutilizzato per adesioni successive.

__anchor_oauth_cc: &disclaimer_oauth_cc |
  Stai configurando un client per l'autenticazione machine-to-machine tramite OAuth 2.0 con flusso Client Credentials. Il servizio verrà chiamato direttamente dalla tua applicazione, senza coinvolgimento dell'utente finale. Dovrai fornire il nome del client da registrare. Il client verrà associato all'adesione e potrà essere riutilizzato per adesioni successive.

__anchor_http_basic: &disclaimer_http_basic |
  Stai configurando un client per l'autenticazione HTTP Basic. Dovrai fornire solo il nome del client. Le credenziali di accesso (username e password) verranno generate e comunicate dal gestore del catalogo. Il client verrà associato all'adesione e potrà essere riutilizzato per adesioni successive.

__anchor_mtls: &disclaimer_mtls |
  Stai creando un nuovo client per questa adesione. Dovrai caricare (o richiedere) il certificato X.509 della tua organizzazione. Il client e il certificato verranno associati all'adesione e potranno essere riutilizzati per adesioni successive.

__anchor_no_dati: &disclaimer_no_dati |
  Stai configurando un client per un servizio che non richiede autenticazione aggiuntiva. È sufficiente fornire il nome del client da associare a questa adesione. Il client verrà registrato nell'API Gateway e potrà essere riutilizzato per adesioni successive.

__anchor_mtls_fruizioni: &disclaimer_mtls_fruizioni |
  Stai creando un nuovo client per accedere a un servizio erogato tramite PDND. Dovrai caricare (o richiedere) il certificato X.509 che la tua applicazione utilizzerà per autenticarsi verso l'ente erogatore. Il client e il certificato verranno associati all'adesione e potranno essere riutilizzati per adesioni successive.

__anchor_oauth_cc_fruizioni: &disclaimer_oauth_cc_fruizioni |
  Stai registrando un nuovo client per accedere a un servizio erogato tramite PDND con autenticazione OAuth 2.0 Client Credentials. La tua applicazione si autenticherà con un token OAuth senza coinvolgimento dell'utente finale. Le credenziali verranno generate e comunicate dal gestore del catalogo. Il client verrà associato all'adesione e potrà essere riutilizzato per adesioni successive.

__anchor_basic_fruizioni: &disclaimer_basic_fruizioni |
  Stai registrando un nuovo client per accedere a un servizio erogato tramite PDND con autenticazione HTTP Basic. Le credenziali di accesso verranno generate e comunicate dal gestore del catalogo dopo l'approvazione della richiesta. Il client verrà associato all'adesione e potrà essere riutilizzato per adesioni successive.

# Adattato a partire da OAuth CC Fruizioni mantenendo il contesto PDND
__anchor_oauth_ac_fruizioni: &disclaimer_oauth_ac_fruizioni |
  Stai registrando un nuovo client per accedere a un servizio erogato tramite PDND con autenticazione OAuth 2.0 Authorization Code. Il flusso coinvolge l'utente finale nel processo di autenticazione. Dovrai fornire gli URL della tua applicazione che gestiranno il flusso OAuth. Il client verrà associato all'adesione e potrà essere riutilizzato per adesioni successive.

