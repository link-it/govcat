# =============================================================================
# Disclaimer per le adesioni - Lingua: Italiano
# =============================================================================
#
# Chiavi gerarchiche con dot-notation: stato.codice_interno_profilo.nome_dominio
# Opzionalmente si puo' aggiungere un suffisso ".collaudo" o ".produzione" per
# il contesto specifico (altrimenti il contesto e' "generale").
#
# La risoluzione avviene dal piu' specifico al meno specifico. Per ogni livello
# vengono cercate anche le varianti con suffisso ".collaudo" e ".produzione":
#   1. {stato}.{codice_interno}.{dominio}[.{ambiente}]  (piu' specifico)
#   2. {stato}.{codice_interno}[.{ambiente}]
#   3. {stato}[.{ambiente}]
#   4. default                                          (fallback)
#
# FORMATI DEL VALORE:
#   - Stringa semplice            -> severity di default = INFO
#   - Oggetto { severity, testo } -> severity esplicita
#
# SEVERITY: INFO | WARNING | ERROR
#
# Se il nome del dominio contiene spazi, racchiudere la chiave tra virgolette.
#
# Per sovrascrivere questi disclaimer dall'esterno, copiare questo file in:
#   /var/govcat/conf/disclaimers_it.yml
# =============================================================================

# -----------------------------------------------------------------------------
# FALLBACK GENERALE
# -----------------------------------------------------------------------------

default: |
  Procedendo con l'adesione, l'ente accetta i termini e le condizioni del servizio.

# -----------------------------------------------------------------------------
# DISCLAIMER PER STATO (generale, indipendente dal profilo)
# -----------------------------------------------------------------------------

bozza:
  severity: WARNING
  testo: |
    ## Adesione in bozza
    L'adesione è stata creata ma non è ancora stata inviata per la configurazione. Per procedere:
    - Completa la configurazione nelle sezioni **Collaudo** e/o **Produzione**
    - Invia la richiesta tramite il pulsante **"Richiesta configurazione in collaudo"**

    Finché l'adesione rimane in bozza non sarà visibile ai referenti del servizio.

richiesto_collaudo: |
  ## In attesa di autorizzazione
  La richiesta di adesione in **collaudo** è stata inviata ed è in attesa di autorizzazione da parte del **referente del servizio**. Non sono richieste ulteriori azioni da parte tua in questa fase. Riceverai una notifica quando la richiesta sarà valutata.

autorizzato_collaudo: |
  ## Autorizzata — in attesa di configurazione
  La richiesta di adesione in **collaudo** è stata autorizzata. Il gestore della piattaforma sta procedendo con la configurazione sull'API Gateway. Riceverai una notifica al termine.

in_configurazione_manuale_collaudo: |
  ## Configurazione in corso (collaudo)
  Il gestore sta configurando l'adesione sull'API Gateway di **collaudo**. Non sono richieste azioni da parte tua. Riceverai una notifica al completamento.

in_configurazione_automatica_collaudo: |
  ## Configurazione in corso (collaudo)
  Il gestore della piattaforma sta configurando l'adesione sull'API Gateway di **collaudo**. Non sono richieste azioni da parte tua. Riceverai una notifica al completamento.

pubblicato_collaudo: |
  ## Adesione attiva in collaudo
  L'adesione è **attiva nell'ambiente di collaudo**. Puoi procedere con i test di integrazione. Quando sei pronto, avvia la procedura per richiedere la pubblicazione in **produzione**.

richiesto_produzione: |
  ## In attesa di autorizzazione (produzione)
  La richiesta di adesione in **produzione** è stata inviata ed è in attesa di autorizzazione da parte del **referente del servizio**. Non sono richieste ulteriori azioni da parte tua. Riceverai una notifica quando la richiesta sarà valutata.

autorizzato_produzione: |
  ## Autorizzata — in attesa di configurazione (produzione)
  La richiesta di adesione in **produzione** è stata autorizzata. Il gestore della piattaforma sta procedendo con la configurazione sull'API Gateway. Riceverai una notifica al termine.

in_configurazione_manuale_produzione: |
  ## Configurazione in corso (produzione)
  Il gestore della piattaforma sta configurando l'adesione sull'API Gateway di **produzione**. Non sono richieste azioni da parte tua. Riceverai una notifica al completamento.

in_configurazione_automatica_produzione: |
  ## Configurazione automatica in corso (produzione)
  Il gestore della piattaforma sta configurando l'adesione sull'API Gateway di **produzione**. Non sono richieste azioni da parte tua. Riceverai una notifica al completamento.

pubblicato_produzione: |
  ## Adesione attiva in produzione ✓
  L'adesione è **attiva in produzione**. Il servizio è operativo. Per modifiche o aggiornamenti alla configurazione contatta il referente del servizio.

archiviato:
  severity: WARNING
  testo: |
    ## Adesione archiviata
    Questa adesione è stata **archiviata** e non è più attiva. Il servizio non è accessibile tramite questa adesione. Per ripristinare l'accesso è necessario avviare una nuova procedura di adesione.

# -----------------------------------------------------------------------------
# PROFILI PDND
# -----------------------------------------------------------------------------

bozza.pdnd:
  severity: WARNING
  testo: |
    ## Profilo PDND
    Per questo profilo e' richiesta la registrazione dell'e-service sulla
    piattaforma PDND. Assicurati di avere l'**identificativo** e la
    **versione** dell'e-service PDND gia' configurati.

bozza.pdnd-audit:
  severity: WARNING
  testo: |
    ## Profilo PDND + Audit
    L'audit PDND richiede la configurazione aggiuntiva della token policy di
    audit. Verifica di avere accesso alla policy richiesta.

bozza.pdnd-https:
  severity: WARNING
  testo: |
    ## Profilo PDND + mTLS
    Oltre alla registrazione PDND, serve un **certificato client** valido
    per l'autenticazione mTLS.

bozza.pdnd-integrity-rest:
  severity: WARNING
  testo: |
    ## Profilo PDND + Integrity (REST)
    Questo profilo richiede il supporto **Integrity** per API REST.
    Verifica che l'API esposta sia compatibile.

bozza.pdnd-integrity-soap:
  severity: WARNING
  testo: |
    ## Profilo PDND + Integrity (SOAP)
    Questo profilo richiede il supporto **Integrity** per API SOAP.

bozza.pdnd-audit-integrity-rest:
  severity: WARNING
  testo: |
    ## Profilo PDND + Audit + Integrity (REST)
    Combinazione completa: audit + integrity per API REST. Verificare che
    tutte e due le token policy siano configurate.

bozza.pdnd-audit-integrity-soap:
  severity: WARNING
  testo: |
    ## Profilo PDND + Audit + Integrity (SOAP)
    Combinazione completa: audit + integrity per API SOAP.

bozza.pdnd-integrity-rest-https:
  severity: WARNING
  testo: |
    ## Profilo PDND + Integrity + mTLS (REST)
    Questo profilo combina la registrazione PDND con Integrity e
    l'autenticazione mTLS. Servono sia eService PDND che certificato client.

bozza.pdnd-integrity-soap-https:
  severity: WARNING
  testo: |
    ## Profilo PDND + Integrity + mTLS (SOAP)
    Questo profilo combina la registrazione PDND con Integrity e
    l'autenticazione mTLS per API SOAP.

pubblicato_produzione.pdnd:
  severity: ERROR
  testo: |
    ## Attenzione: PDND in produzione
    L'adesione e' attiva sul circuito PDND di produzione. Le modifiche alla
    configurazione (token policy, audit, rate limiting) hanno impatto
    immediato sugli utenti e sui consumi PDND.

pubblicato_produzione.pdnd-audit:
  severity: ERROR
  testo: |
    ## Attenzione: PDND + Audit in produzione
    Le chiamate generano eventi di audit reali. Valutare gli impatti prima
    di modificare la configurazione.

# -----------------------------------------------------------------------------
# PROFILI ModI
# -----------------------------------------------------------------------------

bozza.modi_p1: |
  ## Profilo ModI P1
  Il profilo **ModI P1** utilizza autenticazione mTLS. Serve un certificato
  client valido.

bozza.modi_p2:
  severity: WARNING
  testo: |
    ## Profilo ModI P2
    Il profilo **ModI P2** richiede sia il *certificato di autenticazione
    mTLS* che il *certificato di firma* del messaggio.

bozza.modi_p3:
  severity: WARNING
  testo: |
    ## Profilo ModI P3
    Il profilo **ModI P3** richiede sia il *certificato di autenticazione
    mTLS* che il *certificato di firma* del messaggio, con requisiti di
    sicurezza estesi rispetto a ModI P2.

pubblicato_produzione.modi_p2:
  severity: ERROR
  testo: |
    ## ModI P2 in produzione
    Il certificato di firma e' in uso: la sua rotazione richiede coordinamento
    con il soggetto referente per evitare interruzioni di servizio.

pubblicato_produzione.modi_p3:
  severity: ERROR
  testo: |
    ## ModI P3 in produzione
    Il certificato di firma e' in uso: la sua rotazione richiede coordinamento
    con il soggetto referente per evitare interruzioni di servizio.

# -----------------------------------------------------------------------------
# PROFILI INTERNI
# -----------------------------------------------------------------------------

bozza.interno_https: |
  ## Profilo mTLS interno
  Autenticazione tramite **certificato client (mTLS)**. Fornire un certificato
  valido oppure richiederne uno tramite CN o CSR.

bozza.interno_http_basic: |
  ## Profilo HTTP Basic interno
  Autenticazione con username/password. E' possibile configurare *rate
  limiting* e *finalita' d'uso*.

bozza.interno_no_dati:
  severity: WARNING
  testo: |
    ## Profilo senza autenticazione (interno)
    Non e' richiesta alcuna autenticazione. Valutare attentamente l'uso in
    ambienti esposti o multi-tenant.

bozza.interno_oauth_client_credentials: |
  ## Profilo OAuth Client Credentials (interno)
  Autenticazione machine-to-machine tramite token OAuth2 (flow Client
  Credentials).

bozza.interno_oauth_authorization_code: |
  ## Profilo OAuth Authorization Code (interno)
  Autenticazione tramite flow *Authorization Code*. Serve configurare
  client-id, client-secret e redirect URI.

# -----------------------------------------------------------------------------
# PROFILI FRUIZIONI PDND (verso PDND esterni)
# -----------------------------------------------------------------------------

bozza.mtls_fruizioni: |
  ## Fruizione PDND - mTLS
  Profilo per fruire e-service PDND con autenticazione **mTLS**. Richiede
  certificato client valido.

bozza.basic_fruizioni: |
  ## Fruizione PDND - HTTP Basic
  Profilo per fruire e-service PDND con autenticazione **HTTP Basic**.

bozza.oauth_ac_fruizioni: |
  ## Fruizione PDND - OAuth Authorization Code
  Profilo per fruire e-service PDND con **OAuth Authorization Code**.

bozza.oauth_cc_fruizioni: |
  ## Fruizione PDND - OAuth Client Credentials
  Profilo per fruire e-service PDND con **OAuth Client Credentials**.

pubblicato_produzione.mtls_fruizioni:
  severity: WARNING
  testo: |
    ## Fruizione PDND in produzione (mTLS)
    Stai fruendo un e-service PDND reale: le richieste consumano quota PDND.

pubblicato_produzione.basic_fruizioni:
  severity: WARNING
  testo: |
    ## Fruizione PDND in produzione (HTTP Basic)
    Stai fruendo un e-service PDND reale: le richieste consumano quota PDND.

pubblicato_produzione.oauth_ac_fruizioni:
  severity: WARNING
  testo: |
    ## Fruizione PDND in produzione (OAuth AC)
    Stai fruendo un e-service PDND reale: le richieste consumano quota PDND.

pubblicato_produzione.oauth_cc_fruizioni:
  severity: WARNING
  testo: |
    ## Fruizione PDND in produzione (OAuth CC)
    Stai fruendo un e-service PDND reale: le richieste consumano quota PDND.

# -----------------------------------------------------------------------------
# ESEMPI CON SUFFISSO DI CONTESTO (.collaudo / .produzione)
# -----------------------------------------------------------------------------

pubblicato_collaudo.pdnd.collaudo: |
  Sull'ambiente di **collaudo PDND** puoi effettuare chiamate di test con
  identificativi di test. Non consuma quota produzione.

pubblicato_produzione.pdnd.produzione:
  severity: ERROR
  testo: |
    In **produzione PDND** ogni chiamata utilizza token reali e consuma quota.

pubblicato_collaudo.modi_p2.collaudo: |
  Sull'ambiente di **collaudo** per ModI P2 e' possibile utilizzare certificati
  di test.

pubblicato_produzione.modi_p2.produzione:
  severity: ERROR
  testo: |
    In **produzione** i certificati ModI P2 devono essere quelli reali.
    Verificare la scadenza e gestirne la rotazione per tempo.

# -----------------------------------------------------------------------------
# ESEMPI CON DOMINIO (per scopi di test)
# -----------------------------------------------------------------------------

