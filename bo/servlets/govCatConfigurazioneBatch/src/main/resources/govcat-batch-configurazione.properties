#spring.batch.job.enabled=false
org.govway.api.catalogo.batch.resource.path=${org.govway.api.catalogo.batch.resource.path}
org.govway.api.catalogo.configurazione.path=${org.govway.api.catalogo.configurazione.path}

spring.main.banner-mode=off
spring.datasource.jndiName=org.govcat.datasource

spring.jpa.properties.hibernate.show_sql=false
spring.jpa.properties.hibernate.format_sql=false
# Configurazione JPA / Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect


# Format SQL queries
spring.jpa.hibernate.ddl-auto=none
spring.batch.initialize-schema=never


configurazione-automatica.batch.numeroMassimoTentativi=3

configurazione-automatica.batch.utente_configuratore=lorenzo.gestore

configurazione-automatica.batch.configurazioneExecutorClass=configuratore.ConfigurazioneExecutor
# Intervallo di esecuzione del batch in millisecondi (default 1000 = 1 secondo).
# Override possibile nel file esterno /var/govcat/conf/govcat-batch-configurazione.properties.
# Il tick non si sovrappone: se l'esecuzione precedente e' in corso, il tick viene saltato
# (vedi AtomicBoolean 'running' in Application.runJob). I tick non vengono accodati.
scheduled.fixedRate=1000

spring.main.allow-bean-definition-overriding=true

# Abilita i commenti SQL
spring.jpa.properties.hibernate.use_sql_comments=true

# Log di Spring Data JPA
spring.jpa.show-sql=false
