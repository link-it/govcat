<div class="dropdown b-dropdown gl-new-dropdown btn-group" id="actions">
  <button aria-haspopup="true" aria-expanded="false" type="button" class="btn dropdown-toggle btn-default btn-md gl-button gl-dropdown-toggle dropdown-icon-only dropdown-toggle-no-caret" data-bs-toggle="dropdown" data-bs-display="static">
    @if (icon) {
      <i class="bi bi-{{ icon }}"></i>
    }
    @if (title) {
      <span class="d-none d-md-block" [class.ms-2]="icon">{{ title | translate }}</span>
    }
    <i class="bi bi-chevron-down ms-2"></i>
  </button>
  <ul role="menu" tabindex="-1" class="dropdown-menu" [class.dropdown-menu-end]="menuEnd">
    <div class="gl-new-dropdown-inner">
      <div class="gl-new-dropdown-contents">
        @if (items.length) {
          @for (menu of items; track menu) {
            @if (menu.enabled) {
              @switch (menu.type) {
                @case ('divider') {
                  <li class="gl-new-dropdown-divider">
                    <hr role="separator" aria-orientation="horizontal" class="dropdown-divider">
                  </li>
                }
                @case ('submenu') {
                  <li class="pt-2 gl-dropdown-item">
                    <label class="label-bold gl-px-4! mb-2">{{ menu.title | translate }}</label>
                  </li>
                  @for (submenu of menu.submenus; track submenu) {
                    @if (submenu.enabled) {
                      <li class="gl-new-dropdown-item">
                        <button role="menuitem" type="button" class="dropdown-item" (click)="onAction(submenu);">
                          @if (submenu.icon) {
                            <div class="gl-icon s16 gl-new-dropdown-item-check-icon gl-mt-3 gl-align-self-start">
                              <i class="bi bi-{{ submenu.icon }}"></i>
                            </div>
                          }
                          <div class="gl-new-dropdown-item-text-wrapper">
                            <p class="gl-new-dropdown-item-text-primary">{{ submenu.title | translate }}</p>
                          </div>
                        </button>
                      </li>
                    }
                  }
                }
                @case ('label') {
                  <li class="pt-2 gl-dropdown-item">
                    <label class="label-bold gl-px-4! mb-2">{{ menu.title | translate }}</label>
                  </li>
                }
                @default {
                  <li class="gl-new-dropdown-item">
                    <button role="menuitem" type="button" class="dropdown-item" (click)="onAction(menu);">
                      @if (menu.icon) {
                        <div class="gl-icon s16 gl-new-dropdown-item-check-icon gl-mt-3 gl-align-self-start">
                          <i class="bi bi-{{ menu.icon }}"></i>
                        </div>
                      }
                      <div class="gl-new-dropdown-item-text-wrapper">
                        <p class="gl-new-dropdown-item-text-primary">{{ menu.title | translate }}</p>
                      </div>
                    </button>
                  </li>
                }
              }
            }
          }
        }
      </div>
    </div>
  </ul>
</div>
