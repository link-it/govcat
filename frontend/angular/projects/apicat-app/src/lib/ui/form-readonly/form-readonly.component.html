<form>
  <div class="row">
    @for (_field of _fields; track $index; let last = $last) {
      <div class="form-group col-xs-12 col-sm-{{ _columns }} form-col-block" [class.mb-4]="!last" [class.mb-0]="last">
        @if (_field.type !== 'image' && _field.download && _field.icon) {
          <span class="label-bold mb-0">{{ _field.label }}</span>
          <div class="form-control-plaintext">
            <button type="button" class="btn btn-sn btn-secondary" (click)="__downloadClick(_field)">
              <em class="bi bi-{{ _field.icon }}"></em>
              {{ 'APP.BUTTON.Download' | translate }}
            </button>
          </div>
        }
        @if (_field.type !== 'image' && !_field.download ) {
          <span class="label-bold mb-0">{{ _field.label }}</span>
          <span class="form-control-plaintext" [innerHtml]="_field.value"></span>
        }
      </div>
    }
  </div>
</form>
