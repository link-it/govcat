<div class="modal-header align-items-center">
  <div class="d-flex align-items-center gap-3 flex-grow-1">
    <h5 class="modal-title mb-0">{{ titleKey | translate }}</h5>
    @if (apis.length > 1) {
      <div class="dropdown b-dropdown gl-new-dropdown btn-group" id="pdnd-api-select">
        <button aria-haspopup="true" aria-expanded="false" type="button" class="btn dropdown-toggle btn-default btn-md gl-button gl-dropdown-toggle dropdown-toggle-no-caret" data-bs-toggle="dropdown" data-bs-display="static">
          <span>{{ apiLabel(selectedApi) }}</span> <i class="bi bi-chevron-down ms-2"></i>
        </button>
        <ul tabindex="-1" class="dropdown-menu">
          <div class="gl-new-dropdown-inner">
            <div class="gl-new-dropdown-contents">
              @for (api of apis; track api.id_api) {
                <li class="gl-new-dropdown-item">
                  <button role="menuitem" type="button" class="dropdown-item" [class.active]="api.id_api === selectedApiId" (click)="selectApi(api)">
                    <div class="gl-new-dropdown-item-text-wrapper">
                      <p class="gl-new-dropdown-item-text-primary">{{ apiLabel(api) }}</p>
                    </div>
                  </button>
                </li>
              }
            </div>
          </div>
        </ul>
      </div>
    } @else if (apis.length === 1) {
      <span class="text-muted">{{ apiLabel(selectedApi) }}</span>
    }
  </div>
  <button type="button" class="btn-close" aria-label="Close" (click)="closeModal()"></button>
</div>
<div class="modal-body">
  @for (api of selectedApiList; track api.id_api) {
    @if (mode === 'informations') {
      <app-servizio-api-pdnd-informations
        [embedded]="true"
        [inputSid]="sid"
        [inputApiId]="api.id_api"
        [inputProducerIdCollaudo]="producerIdCollaudo"
        [inputProducerIdProduzione]="producerIdProduzione">
      </app-servizio-api-pdnd-informations>
    } @else {
      <app-servizio-api-subscribers
        [embedded]="true"
        [inputSid]="sid"
        [inputApiId]="api.id_api"
        [inputProducerIdCollaudo]="producerIdCollaudo"
        [inputProducerIdProduzione]="producerIdProduzione">
      </app-servizio-api-subscribers>
    }
  }
</div>
